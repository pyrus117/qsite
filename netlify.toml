[build]
  publish = "public"
  command = "npm run build"

[[headers]]
  for = "/studio/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Start render-critical fetches at response-header time, before HTML parsing
[[headers]]
  for = "/*"
  [headers.values]
    Link = "</styles.css>; rel=preload; as=style"

# Pages that render from site-data.json also warm the script + data
[[headers]]
  for = "/"
  [headers.values]
    Link = ["</site-content.js>; rel=preload; as=script", "</site-data.json>; rel=preload; as=fetch; crossorigin"]

[[headers]]
  for = "/index.html"
  [headers.values]
    Link = ["</site-content.js>; rel=preload; as=script", "</site-data.json>; rel=preload; as=fetch; crossorigin"]

[[headers]]
  for = "/blog.html"
  [headers.values]
    Link = ["</site-content.js>; rel=preload; as=script", "</site-data.json>; rel=preload; as=fetch; crossorigin"]

[[headers]]
  for = "/resources.html"
  [headers.values]
    Link = ["</site-content.js>; rel=preload; as=script", "</site-data.json>; rel=preload; as=fetch; crossorigin"]

[[headers]]
  for = "/local-directory.html"
  [headers.values]
    Link = ["</site-content.js>; rel=preload; as=script", "</site-data.json>; rel=preload; as=fetch; crossorigin"]
