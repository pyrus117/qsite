<!DOCTYPE html>
<html lang="en-NZ">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Q Youth Blog Studio</title>
  <link rel="stylesheet" href="studio.css">
</head>
<body>
  <main id="app">
    <p id="loading">Loading…</p>

    <header id="user-bar" hidden>
      <span id="user-email"></span>
      <button id="logout-btn" type="button">Log out</button>
    </header>

    <section id="view-composer" hidden>
      <h1>New blog post</h1>
      <form id="composer-form">
        <label>Title <input type="text" id="post-title" required maxlength="255"></label>
        <label>Date <input type="date" id="post-date" required></label>
        <label>Body <textarea id="post-body" rows="14" required
          placeholder="Blank line between paragraphs"></textarea></label>
        <label>Image (optional) <input type="file" id="post-image" accept="image/*"></label>
        <label>Image description (alt text) <input type="text" id="post-image-alt"></label>
        <label>Link (optional) <input type="text" id="post-link" placeholder="e.g. index.html#contact"></label>
        <label>Link label <input type="text" id="post-link-label" placeholder="e.g. Get in touch"></label>
        <button type="submit" id="publish-btn">Publish to qyouthnz.com</button>
      </form>
    </section>

    <section id="view-admin" hidden></section>
  </main>
  <div id="toast" hidden></div>
  <script type="module" src="studio.js"></script>
</body>
</html>
